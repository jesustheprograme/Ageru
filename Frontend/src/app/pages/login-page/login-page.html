<section class="login-shell">
  <header class="topbar" aria-label="Primary navigation">
    <div class="nav-brand">
      <button class="menu-button" type="button" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav class="nav-links" aria-label="Secondary navigation">
      <a href="#" class="social-link" aria-label="Twitter">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M22.5 5.8c-.7.3-1.5.5-2.3.6.8-.5 1.4-1.2 1.7-2.2-.8.5-1.7.8-2.6 1-1.6-1.7-4.4-.8-4.9 1.5-.1.4-.1.8 0 1.1-3.2-.2-6-1.7-7.9-4-.4.7-.6 1.6-.3 2.5.2.9.8 1.7 1.6 2.1-.7 0-1.4-.2-2-.5 0 2 1.4 3.7 3.3 4.1-.6.2-1.3.2-2 .1.5 1.7 2.1 2.9 3.9 2.9-1.8 1.4-4 2.1-6.3 1.8 1.9 1.2 4.2 1.9 6.7 1.9 8 0 12.5-6.8 12.2-12.9.8-.6 1.5-1.3 2-2.1z"
          />
        </svg>
      </a>
    </nav>
  </header>

  <main class="login-content">
    <form class="login-card" [formGroup]="form" (ngSubmit)="startLogin()" aria-label="Iniciar sesion">
      <div class="logo-mark">
        <img src="/login-page/now-logo.png" alt="Now UI Kit logo" />
      </div>

      <label class="input-row">
        <span class="input-icon id-icon">DNI</span>
        <input
          type="text"
          name="dni"
          inputmode="numeric"
          maxlength="8"
          pattern="[0-9]*"
          formControlName="dni"
          placeholder="DNI..."
          autocomplete="username"
          (input)="limitDniLength($event)"
        />
      </label>

      <label class="input-row">
        <span class="input-icon user-icon">@</span>
        <input type="email" name="email" formControlName="email" placeholder="Email..." autocomplete="email" />
      </label>

      <label class="input-row">
        <span class="input-icon password-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 17a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2m6-9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5a5 5 0 0 1 5 5v2zm-6-5a3 3 0 0 0-3 3v2h6V6a3 3 0 0 0-3-3"
            />
          </svg>
        </span>
        <input
          type="password"
          name="password"
          formControlName="password"
          placeholder="Contrasena..."
          autocomplete="current-password"
        />
      </label>

      <button class="start-button" type="submit" [disabled]="isLoading() || isRedirecting()">
        {{ isLoading() ? 'Validando...' : 'Iniciar sesion' }}
      </button>

      <div class="form-links">
        <a routerLink="/register">CREATE ACCOUNT</a>
        <a routerLink="/forgot-password">OLVIDE MI CONTRASENA</a>
        @if (message()) {
          <p class="login-message" role="alert" aria-live="polite">{{ message() }}</p>
          }
      </div>
    </form>
  </main>

  @if (isRedirecting()) {
    <div class="login-toast" role="status" aria-live="polite">
      Inicio de Sesion Exitoso, redirigiendo...
    </div>
  }

  <footer class="login-footer">
    <nav aria-label="Footer navigation">
      <a href="#">Oficcial Page</a>
    </nav>

  </footer>
</section>
