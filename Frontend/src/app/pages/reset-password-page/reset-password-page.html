<section class="login-shell recovery-shell">
  <header class="topbar" aria-label="Primary navigation">
    <div class="nav-brand">
      <button class="menu-button" type="button" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a routerLink="/" class="brand-link">AGERU</a>
    </div>

    <nav class="nav-links" aria-label="Secondary navigation">
      <a routerLink="/">INICIAR SESION</a>
    </nav>
  </header>

  <main class="login-content">
    <form class="login-card recovery-card" [formGroup]="form" (ngSubmit)="savePassword()" aria-label="Nueva contrasena">
      <div class="logo-mark">
        <img src="/login-page/now-logo.png" alt="Ageru logo" />
      </div>

      <div class="recovery-heading">
        <span>Seguridad</span>
        <h1>Nueva contrasena</h1>
      </div>

      <label class="input-row">
        <span class="input-icon password-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 17a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2m6-9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5a5 5 0 0 1 5 5v2zm-6-5a3 3 0 0 0-3 3v2h6V6a3 3 0 0 0-3-3"
            />
          </svg>
        </span>
        <input type="password" formControlName="password" placeholder="Contrasena..." autocomplete="new-password" />
      </label>

      <label class="input-row">
        <span class="input-icon password-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 17a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2m6-9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5a5 5 0 0 1 5 5v2zm-6-5a3 3 0 0 0-3 3v2h6V6a3 3 0 0 0-3-3"
            />
          </svg>
        </span>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirmar..."
          autocomplete="new-password"
        />
      </label>

      <button class="start-button" type="submit" [disabled]="loading()">
        {{ loading() ? 'Guardando...' : 'Cambiar contrasena' }}
      </button>

      <div class="form-links recovery-links">
        <a routerLink="/">VOLVER</a>
      </div>

      @if (message()) {
        <p class="recovery-message" role="status" aria-live="polite">{{ message() }}</p>
      }
    </form>
  </main>

  <footer class="login-footer">
    <nav aria-label="Footer navigation">
      <a href="#">AGERU</a>
      <a href="#">SOPORTE</a>
      <a href="#">SEGURIDAD</a>
    </nav>
  </footer>
</section>
